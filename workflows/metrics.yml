name: Metrics

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          user: Suryavamsi53
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: github-metrics.svg

          # 🧩 Base sections
          base: header, activity, community, repositories

          config_timezone: Asia/Kolkata

          # 🔥 Languages (like in image)
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_limit: 8

          # 🔥 Calendar (contribution heatmap style)
          plugin_isocalendar: yes

          # 🔥 Coding habits (time + day graph)
          plugin_habits: yes
          plugin_habits_days: 14

          # 🔥 Tech topics (icons)
          plugin_topics: yes
          plugin_topics_limit: 12

          # 🔥 Stars & popularity
          plugin_stars: yes

          # 🔥 Traffic (views, clones)
          plugin_traffic: yes

          # 🔥 Achievements badges
          plugin_achievements: yes

          # 🔥 3D skyline graph (very cool)
          plugin_skyline: yes

          # 🔥 Follow-up activity
          plugin_followup: yes
